# ==========================================
# MULTI-TENANT TEST CONFIGURATION (H2)
# Used by @ActiveProfiles("test") for integration tests
# ==========================================
# H2 in-memory datasource (no MySQL needed)
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver

# Deployment mode: centralized | dedicated
app.profile=centralized

# Test tenants with H2 datasources (no MySQL needed)
app.tenants.acme.service-token=tok-A
app.tenants.acme.reportes-ruta=src/test/resources/reportes/test-tenant/
app.tenants.acme.datasource.url=jdbc:h2:mem:acme;DB_CLOSE_DELAY=-1
app.tenants.acme.datasource.username=sa
app.tenants.acme.datasource.password=
app.tenants.acme.datasource.driver-class-name=org.h2.Driver
app.tenants.acme.allowed-reports=ventas,stock,test_report
app.tenants.acme.allowed-formats=PDF

app.tenants.corp.service-token=tok-B
app.tenants.corp.reportes-ruta=src/test/resources/reportes/corp/
app.tenants.corp.datasource.url=jdbc:h2:mem:corp;DB_CLOSE_DELAY=-1
app.tenants.corp.datasource.username=sa
app.tenants.corp.datasource.password=
app.tenants.corp.datasource.driver-class-name=org.h2.Driver
app.tenants.corp.allowed-reports=reporte1
app.tenants.corp.allowed-formats=PDF

# Logging
logging.level.com.example.JaspertReport=DEBUG
