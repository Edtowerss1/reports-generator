# ==========================================
# TEST PROFILE — H2 in-memory (no MySQL required)
# Usage: ./mvnw spring-boot:run -Dspring-boot.run.profiles=test
# ==========================================
app.profile=centralized

# Default tenant with H2
app.tenants.default.service-token=dev-token-2026
app.tenants.default.reportes-ruta=src/main/resources/reportes/
app.tenants.default.datasource.url=jdbc:h2:mem:default;DB_CLOSE_DELAY=-1
app.tenants.default.datasource.username=sa
app.tenants.default.datasource.password=
app.tenants.default.datasource.driver-class-name=org.h2.Driver
app.tenants.default.allowed-formats=PDF,XLSX,DOCX,HTML

# acme tenant
app.tenants.acme.service-token=tok-A
app.tenants.acme.reportes-ruta=src/main/resources/reportes/
app.tenants.acme.datasource.url=jdbc:h2:mem:acme;DB_CLOSE_DELAY=-1
app.tenants.acme.datasource.username=sa
app.tenants.acme.datasource.password=
app.tenants.acme.datasource.driver-class-name=org.h2.Driver
app.tenants.acme.allowed-reports=SimpleReport,MasterReport,DetailReport,ventas,stock,test_report
app.tenants.acme.allowed-formats=PDF,XLSX,DOCX,HTML

# corp tenant
app.tenants.corp.service-token=tok-B
app.tenants.corp.reportes-ruta=src/main/resources/reportes/
app.tenants.corp.datasource.url=jdbc:h2:mem:corp;DB_CLOSE_DELAY=-1
app.tenants.corp.datasource.username=sa
app.tenants.corp.datasource.password=
app.tenants.corp.datasource.driver-class-name=org.h2.Driver
app.tenants.corp.allowed-reports=SimpleReport
app.tenants.corp.allowed-formats=PDF

# H2 console for debugging (optional)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

logging.level.com.example.JaspertReport=DEBUG
